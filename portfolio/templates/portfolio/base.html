{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfólio{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'portfolio/style.css' %}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand glass">
                <div class="logo">Portfólio</div>
                <div class="ver">Gestão de conteúdos</div>
            </div>

            <nav class="menu">
                <a href="{% url 'projeto_list' %}" class="item">Projetos</a>
            </nav>

            <div class="sidebar-footer">
                Django Portfolio
            </div>
        </aside>

        <main class="main">
            <div class="topbar glass">
                <div class="topbar-left">
                    <div class="topbar-title">{% block page_title %}Portfólio{% endblock %}</div>
                </div>
            </div>

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
