{% extends "portfolio/base.html" %}

{% block title %}Registo{% endblock %}
{% block page_title %}Registo{% endblock %}

{% block content %}
<div class="panel">
    <h2 class="panel-title">Criar conta</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            {% for field in form %}
                <div class="field">
                    <label class="field-label">{{ field.label }}</label>
                    {{ field }}

                    {% if field.errors %}
                        <div class="help" style="color:red;">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="actions">
                <button type="submit" class="btn btn-primary">Registar</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
